[package]
name = "vnrit"
version = "0.1.2"
edition = "2021"
description = "Lightweight X11 desktop WebRTC streaming server"
license = "Apache-2.0"  
repository = "https://github.com/nlsidf/vnrit.git"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"

[profile.dev]
# Speed up debug builds: only optimize the hot path
opt-level = 1

[dependencies]
gstreamer = { version = "0.23", features = ["v1_22"] }
gstreamer-webrtc = { version = "0.23", features = ["v1_22"] }
gstreamer-sdp = { version = "0.23", features = ["v1_22"] }
glib = "0.20"

tokio = { version = "1", features = ["full"] }
axum = { version = "0.7", features = ["ws"] }
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
x11rb = { version = "0.13", features = ["xtest", "allow-unsafe-code"] }
x11rb-protocol = "0.13"
mimalloc = "0.1.52"
